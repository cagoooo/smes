  <script>
    $(document).ready(function() {
      function displayMarkdownImages(text, targetElement) {
        let docFragment = document.createDocumentFragment();
        const regex = /!\[.*?]\((.*?)\)/g;
        let match;
        while ((match = regex.exec(text)) !== null) {
          const imageUrl = match[1];
          const img = $('<img>').attr('src', imageUrl).attr('alt', 'Markdown Image').css('max-width', '100%').css('height', 'auto');
          docFragment.appendChild(img[0]); // Append to the fragment
        }
        $(targetElement).append(docFragment); // Append all images at once
      }
    });
  </script>

  <script>
    $(document).on('click', '.btn-outline-secondary', function() {
      // 获取与按钮相关联的消息元素
      let messageElement = $(this).closest('.list-group-item-action').find('p.mb-0');

      // 创建一个临时的textarea元素来复制文本
      let tempTextarea = $("<textarea>");
      $("body").append(tempTextarea);
      tempTextarea.val(extractPlainTextUrls(messageElement.html())).select();
      document.execCommand("copy");
      tempTextarea.remove();

      // 显示模态框，而不是标准的alert
      $('#copyModal').modal('show');
    });

    // 函数：从HTML中提取纯文本链接，同时保留换行
    function extractPlainTextUrls(htmlContent) {
      let tempDiv = document.createElement("div");
      tempDiv.innerHTML = htmlContent;

      // 处理换行符
      Array.from(tempDiv.getElementsByTagName("BR")).forEach(br => {
          br.replaceWith("\n");
      });
      Array.from(tempDiv.getElementsByTagName("P")).forEach(p => {
          p.innerText += "\n";
      });

      // 将超链接转换为纯文本URL
      Array.from(tempDiv.querySelectorAll("a")).forEach(a => {
          a.replaceWith(a.href);
      });

      return tempDiv.innerText.trim();
    }

    // 函数：将HTML内容转换为纯文本，保留必要的格式（如换行）
    function convertHtmlToText(htmlElement) {
      return htmlElement.html().replace(/<br\s*[\/]?>/gi, '\n').replace(/<\/?p>/gi, '\n').trim();
    }
    
    $(document).ready(function() {

    function scrollToBottom() {
        var chatContainer = $("#list-group");

    // 函數：將文本中的網址轉換為超連結
    function convertUrlsToLinks(text) {
      // 更新後的正則表達式
      const urlRegex = /(\bhttps?:\/\/[-A-Z0-9+&@#/%?=~_|!:,.;]*[-A-Z0-9+&@#/%=~_|])/ig;
      return text.replace(urlRegex, function(url) {
        return '<a href="' + url + '" target="_blank" style="color: blue;">' + url + '</a>';
      });
    }

    function saveConversationToBackend(userQuestion, aiAnswer) {

      $.ajax({
        type: "POST",
        url: "/save_conversation",
        contentType: "application/json",

    function formatTextForClipboard(text) {
      return text.replace(/<br>/g, '\n');
    }

    function copyToClipboard(html) {
      // 创建一个临时的DIV来插入HTML内容
      let tmpDiv = document.createElement("DIV");
      tmpDiv.innerHTML = html;

      // 递归处理节点，将HTML转换为纯文本
      function processNode(node) {
        let text = "";
        if (node.nodeType === Node.TEXT_NODE) {
          text = node.nodeValue;
        } else if (node.nodeType === Node.ELEMENT_NODE) {
          for (let child of node.childNodes) {
            text += processNode(child);
          }
          if (node.tagName === "P" || node.tagName === "DIV") {
            text += '\n'; // 段落和DIV元素后添加换行符
          } else if (node.tagName === "BR") {
            text += '\n'; // <br>元素添加换行符
          } else if (node.tagName === "LI") {
            text = '* ' + text.trim() + '\n'; // 列表项前添加'*'和换行符
          }
        }
        return text;
      }

      let textToCopy = processNode(tmpDiv).trim(); // 移除首尾多余的空白字符

      // 创建一个textarea元素来选中并复制文本
      let el = document.createElement('textarea');
      el.value = textToCopy;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
    }

    function sendQuestion() {
      let inputQuestion = $("#user-input").val();
      $("#user-input").val("");
      $("#user-input").css("height", "");  // 新增這行來將輸入框的大小恢復到原來的大小

      let appendConversation = "";
      appendConversation += `
      <a href="#" class="list-group-item list-group-item-action d-flex gap-3 py-3">
          <img src="https://www.smes.tyc.edu.tw/uploads/tadnews/image/logo/logo.png" alt="" width="64" height="64" class="rounded-circle flex-shrink-0">
          <div class="d-flex gap-2 w-100 justify-content-between">
            <div>
              <p class="mb-0 opacity-75" style="font-weight: bold; color: blue;">${inputQuestion}</p>
            </div>
            <div class="mt-1 small">
              <button class="btn btn-outline-secondary btn-sm" style="background-color: #90ee90; color: black; font-weight: bold;">複製</button>
            </div>
          </div>
        </a>`;

      $("#list-group").prepend(appendConversation);

      // Create a unique ID
      let ai_reply_id = 'ai-reply-' + Date.now();

      // Insert a placeholder response with "請稍待..."
      let placeholderResponse = `<a id="${ai_reply_id}" href="#" class="list-group-item list-group-item-action d-flex gap-3 py-3 answer-background">
        <img src="https://www.smes.tyc.edu.tw/uploads/tadnews/image/person/k-a.png" alt="" width="64" height="66" class="rounded-circle flex-shrink-0">
        <div class="d-flex gap-2 w-100 justify-content-between">
          <div>
            <p class="mb-0 opacity-75 blink green-text" style="font-weight: bold;">思考回答中(字數多時需等待)</p>
            <div class="mt-1 small">
              <button class="btn btn-outline-secondary btn-sm" style="background-color: #ffff99; color: black; font-weight: bold;">複製</button>
            </div>
          </div>
        </div>
      </a>`;

      $("#list-group").prepend(placeholderResponse);

      $.ajax({
        type: "POST",
        url: "/",
        data: {'prompt': inputQuestion},
        success: function (data) {
          // Replace placeholder text with the actual answer
          let ai_answer = data.ai_answer.replace(/\n/g, '<br>'); // 将换行符转换为HTML换行
          console.log(ai_answer); // 打印轉換後的答案
          ai_answer = convertUrlsToLinks(ai_answer); // 將網址轉換為超連結
          let ai_answer_chars = ai_answer.split('');
          let current_ai_answer = "";

          // Separate the paragraph and button elements
          let paragraph = $(`#${ai_reply_id} p`);
          let button = $(`#${ai_reply_id} button`);

          paragraph.html("");  // clear the placeholder text
          button.on('click', function() {
            copyToClipboard(current_ai_answer);
          });

          // 每15毫秒添加一个字符到对话框
          let intervalId = setInterval(function() {
            if (ai_answer_chars.length > 0) {
              // 将下一个字符添加到当前的AI回答
              current_ai_answer += ai_answer_chars.shift();

              // 更新对话框的内容
              paragraph.html(current_ai_answer);
            } else {
              // 如果所有字符都已经添加到对话框，则停止setInterval()函数
              clearInterval(intervalId);

              // 移除 'blink' 和 'green-text' CSS classes
              paragraph.removeClass("blink green-text");

              // 添加 'black-text' CSS class
              paragraph.addClass("black-text");
            }
          }, 15);

          saveConversationToBackend(inputQuestion, data.ai_answer);
          sendEmailNotification(inputQuestion, data.ai_answer);
        }
      });
    }

    $("#send-button").click(function() {
      // 檢查輸入框是否為空
      if($("#user-input").val().trim() !== "") {
        sendQuestion();
      }
    });

    $("#user-input").keydown(function(event) {
      if (event.keyCode === 13) {
        event.preventDefault();  // 這行程式碼將阻止 Enter 鍵導致的換行
        // 只有當輸入框不為空時才發送問題
        if ($("#user-input").val().trim() !== "") {
          sendQuestion();
        }
        return false;
      }
    });
  </script>
